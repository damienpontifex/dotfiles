# Blue Dawn: a blue custom theme with One Dark contrast and Nord accents.
# Use double quotes for strings that reference ${bd_*} variables.

bd_bg="#21252b"
bd_surface="#2c3240"
bd_surface_light="#3b4252"
bd_fg="#d8dee9"
bd_muted="#8f9aae"
bd_blue="#61afef"
bd_blue_deep="#004a9e"
bd_cyan="#88c0d0"
bd_green="#98c379"
bd_yellow="#e5c07b"
bd_red="#e06c75"

bd_sep="#[fg=${bd_surface_light}]"
bd_left_arrow="#[fg=${bd_blue},bg=${bd_bg},nobold]"
bd_host_cap="#[fg=${bd_blue},bg=${bd_bg}]#[fg=${bd_bg},bg=${bd_blue},bold] #h "

set -g status on
set -g status-position top
set -g status-justify left
set -g status-interval 5
set -g status-left-length 80
set -g status-right-length 160
set -g status-style "fg=${bd_fg},bg=${bd_bg}"

set -g message-style "fg=${bd_fg},bg=${bd_blue_deep}"
set -g message-command-style "fg=${bd_fg},bg=${bd_blue_deep}"
set -g mode-style "fg=${bd_bg},bg=${bd_blue}"
set -g menu-style "fg=${bd_fg},bg=${bd_bg}"
set -g menu-selected-style "fg=${bd_bg},bg=${bd_blue}"
set -g popup-style "fg=${bd_fg},bg=${bd_bg}"
set -g popup-border-style "fg=${bd_blue},bg=${bd_bg}"

set -g pane-border-lines double
set -g pane-border-status top
set -g pane-border-style "fg=${bd_surface_light},bg=${bd_bg}"
set -g pane-active-border-style "fg=${bd_blue},bg=${bd_bg}"
set -g pane-border-format "#[fg=${bd_muted},bg=${bd_bg}] #P #[fg=${bd_blue}]#{pane_current_command} "

set -g display-panes-colour "${bd_cyan}"
set -g display-panes-active-colour "${bd_yellow}"
set -g clock-mode-colour "${bd_blue}"

setw -g window-status-separator ''
setw -g window-status-style "fg=${bd_muted},bg=${bd_bg}"
setw -g window-status-activity-style "fg=${bd_yellow},bg=${bd_bg}"
setw -g window-status-bell-style "fg=${bd_red},bg=${bd_bg},bold"
setw -g window-status-format "#[fg=${bd_muted},bg=${bd_bg}] #I:#W#{?window_flags,#[fg=${bd_blue}]#{window_flags},} "
setw -g window-status-current-format "#[fg=${bd_bg},bg=${bd_blue},bold] #I:#W#{?window_zoomed_flag, Z,} ${bd_left_arrow}"

set -g window-active-style "bg=${bd_bg}"
set -g window-style "bg=${bd_bg}"

session_status="#[fg=${bd_bg},bg=${bd_blue},bold] #S ${bd_left_arrow}"
prefix_status="#{?client_prefix,#[fg=${bd_bg},bg=${bd_yellow},bold] PREFIX #[fg=${bd_yellow},bg=${bd_bg},nobold],}"
set -g status-left "${session_status}${prefix_status}"

cpu_status="#[fg=${bd_muted},bg=${bd_bg}] #{cpu_fg_color}#{cpu_icon} #{cpu_percentage}"
ram_status="#[fg=${bd_muted},bg=${bd_bg}]#{ram_fg_color}#{ram_icon} #{ram_percentage}"
battery_status="#[fg=${bd_muted},bg=${bd_bg}]#{battery_color_fg}#{battery_icon} #{battery_percentage}"
local_time_status="#[fg=${bd_fg},bg=${bd_bg}]%R %d/%m/%Y"
utc_time_status="#[fg=${bd_cyan}]UTC #(TZ=UTC date +%Y-%m-%dT%H:%M:00Z)"

status_metrics="${cpu_status} ${bd_sep} ${ram_status} ${bd_sep} ${battery_status}"
status_time="${local_time_status} ${bd_sep} ${utc_time_status}"
set -g status-right "${status_metrics} ${bd_sep} ${status_time} ${bd_host_cap}"

# Keep tmux-cpu/tmux-battery accents in the same palette when those plugins are loaded.
set -g @cpu_low_fg_color "#[fg=${bd_green}]"
set -g @cpu_medium_fg_color "#[fg=${bd_yellow}]"
set -g @cpu_high_fg_color "#[fg=${bd_red}]"
set -g @cpu_low_bg_color "#[bg=${bd_bg}]"
set -g @cpu_medium_bg_color "#[bg=${bd_bg}]"
set -g @cpu_high_bg_color "#[bg=${bd_bg}]"
set -g @cpu_low_icon ''
set -g @cpu_medium_icon ''
set -g @cpu_high_icon ''

set -g @ram_low_fg_color "#[fg=${bd_green}]"
set -g @ram_medium_fg_color "#[fg=${bd_yellow}]"
set -g @ram_high_fg_color "#[fg=${bd_red}]"
set -g @ram_low_bg_color "#[bg=${bd_bg}]"
set -g @ram_medium_bg_color "#[bg=${bd_bg}]"
set -g @ram_high_bg_color "#[bg=${bd_bg}]"
set -g @ram_low_icon ''
set -g @ram_medium_icon ''
set -g @ram_high_icon ''

set -g @batt_color_charge_primary_tier8 "${bd_green}"
set -g @batt_color_charge_primary_tier7 "${bd_green}"
set -g @batt_color_charge_primary_tier6 "${bd_cyan}"
set -g @batt_color_charge_primary_tier5 "${bd_yellow}"
set -g @batt_color_charge_primary_tier4 "${bd_yellow}"
set -g @batt_color_charge_primary_tier3 "${bd_red}"
set -g @batt_color_charge_primary_tier2 "${bd_red}"
set -g @batt_color_charge_primary_tier1 "${bd_red}"
set -g @batt_color_status_primary_charged "${bd_green}"
set -g @batt_color_status_primary_charging "${bd_cyan}"
set -g @batt_color_status_primary_discharging "${bd_blue}"
set -g @batt_color_status_primary_attached "${bd_yellow}"
set -g @batt_color_status_primary_unknown "${bd_muted}"

# Nerd Font battery charge icons: full, medium, low, very low.
set -g @batt_icon_charge_tier8 '󱊣'
set -g @batt_icon_charge_tier7 '󱊣'
set -g @batt_icon_charge_tier6 '󱊢'
set -g @batt_icon_charge_tier5 '󱊢'
set -g @batt_icon_charge_tier4 '󱊢'
set -g @batt_icon_charge_tier3 '󱊡'
set -g @batt_icon_charge_tier2 '󱊡'
set -g @batt_icon_charge_tier1 '󰂎'
set -g @batt_icon_status_charged ''
set -g @batt_icon_status_charging ''
set -g @batt_icon_status_attached ''
